<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-6 md:p-8 rounded shadow w-full max-w-sm text-center">
  <div class="flex justify-center mb-4">
    <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 md:w-20">
  </div>
  <h1 class="text-xl md:text-2xl font-bold mb-2">GitHub Issues Tracker</h1>
  <p class="text-gray-500 mb-6 text-sm md:text-base">Sign in to manage your issue</p>

  <input id="userName" type="text" class="border w-full p-2 mb-1 rounded" placeholder="Username">
  <p class="flex mb-4 text-purple-600 text-sm">Default: admin</p>
  
  <input id="password" type="password" class="border w-full p-2 mb-1 rounded" placeholder="Password">
  <p class="flex mb-4 text-purple-600 text-sm">Default: admin123</p>
  
  <button onclick="login()" class="bg-blue-500 hover:bg-blue-600 text-white w-full p-2 rounded">Sign In</button>
  
  <div class="flex items-center my-4">
    <hr class="grow border-t border-gray-400">
    <span class="mx-4 text-gray-700 text-sm">OR</span>
    <hr class="grow border-t border-gray-400">
  </div>
  <p class="text-sm text-gray-500 mt-4">
    Demo Credentials:
  </p>
  <div class="mt-5 text-sm">
    <p> <span class="font-bold">Username:</span><span> admin</span></p>
    <p> <span class="font-bold">Password:</span><span> admin123</span></p>
  
  </div>
</div>
  <script src="./script.js/login.js"></script>
</body>
</html>
