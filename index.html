<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96 text-center">
  <div class="flex justify-center">
    <img src="./assets/github-logo.png" alt="">
  </div>
  <h1 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h1>
  <p class="text-gray-500 mb-6">Sing in to manage your issue</p>
  
  <input id="userName" type="text" class="border w-full p-2 mb-1" placeholder="Username">
  <p class="flex mb-4 text-purple-600">Default: admin</p>
  
  <input id="password" type="password" class="border w-full p-2 mb-1" placeholder="Password">
  <p class="flex mb-4 text-purple-600">Default: admin123</p>
  
  <button onclick="login()" class="bg-blue-500 text-white w-full p-2 rounded">Sign In</button>
  
  <div class="flex items-center my-4">
    <hr class="grow border-t border-gray-400">
    <span class="mx-4 text-gray-700">OR</span>
    <hr class="grow border-t border-gray-400">
  </div>
  <p class="text-sm text-gray-500 mt-4">
    Demo Credentials:
  </p>
  <div class="mt-5">
    <p> <span class="font-bold">Username:</span><span> admin</span></p>
    <p> <span class="font-bold">Password:</span><span> admin123</span></p>
  
  
  </div>
</div>
  <script src="./script.js/login.js"></script>
</body>
</html>
